<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
        .container { position: absolute; bottom: 50px; left: 50px; transition: all 0.5s ease; }
        .background-bar {
            width: 450px; height: 90px;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9) 0%, rgba(60, 60, 60, 0.8) 100%);
            border-left: 8px solid #00f2fe; border-radius: 4px;
            display: flex; align-items: center; padding-left: 25px;
            animation: slideIn 0.8s forwards;
        }
        .text-container { display: flex; flex-direction: column; }
        .artist { font-size: 18px; color: #00f2fe; animation: fadeUp 0.6s 0.5s forwards; opacity: 0; }
        .title { font-size: 30px; color: white; font-weight: bold; animation: fadeUp 0.6s 0.7s forwards; opacity: 0; }
        @keyframes slideIn { 0% { transform: translateX(-110%); } 100% { transform: translateX(0); } }
        @keyframes fadeUp { 0% { transform: translateY(15px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="background-bar" id="target-bar">
            <div class="text-container">
                <span class="artist" id="disp-artist">READY</span>
                <span class="title" id="disp-title">WAITING DATA...</span>
            </div>
        </div>
    </div>

    <script>
        // 'music_channel'이라는 이름의 무전기 채널 개설
        const bc = new BroadcastChannel('music_channel');

        bc.onmessage = (event) => {
            const data = event.data;
            const bar = document.getElementById('target-bar');
            const artist = document.getElementById('disp-artist');
            const title = document.getElementById('disp-title');
            const container = document.getElementById('main-container');

            // 내용 및 위치 업데이트
            artist.innerText = data.artist;
            title.innerText = data.title;
            container.style.left = data.posX + "px";
            container.style.bottom = data.posY + "px";

            // 애니메이션 재시작
            bar.style.animation = 'none';
            artist.style.animation = 'none';
            title.style.animation = 'none';
            bar.offsetHeight; // 강제 리플로우
            bar.style.animation = '';
            artist.style.animation = '';
            title.style.animation = '';
        };
    </script>
</body>
</html>
