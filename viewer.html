<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        .container { position: absolute; transition: all 0.5s ease; }
        .background-bar {
            width: 450px; height: 90px;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9) 0%, rgba(60, 60, 60, 0.8) 100%);
            border-left: 8px solid #00f2fe; border-radius: 4px;
            display: flex; align-items: center; padding-left: 25px;
            animation: slideIn 0.8s forwards;
        }
        .text-container { display: flex; flex-direction: column; }
        .artist { font-size: 18px; color: #00f2fe; animation: fadeUp 0.6s 0.5s forwards; opacity: 0; }
        .title { font-size: 30px; color: white; font-weight: bold; animation: fadeUp 0.6s 0.7s forwards; opacity: 0; }
        @keyframes slideIn { 0% { transform: translateX(-110%); } 100% { transform: translateX(0); } }
        @keyframes fadeUp { 0% { transform: translateY(15px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="background-bar">
            <div class="text-container">
                <span class="artist" id="disp-artist">가수 이름</span>
                <span class="title" id="disp-title">곡 제목</span>
            </div>
        </div>
    </div>

    <script>
        // 주소창의 파라미터를 읽어오는 함수 (?artist=BTS... 등)
        const urlParams = new URLSearchParams(window.location.search);
        const artist = urlParams.get('artist') || "READY";
        const title = urlParams.get('title') || "WAITING DATA...";
        const posX = urlParams.get('x') || "50";
        const posY = urlParams.get('y') || "50";

        document.getElementById('disp-artist').innerText = artist;
        document.getElementById('disp-title').innerText = title;
        document.getElementById('main-container').style.left = posX + "px";
        document.getElementById('main-container').style.bottom = posY + "px";
    </script>
</body>
</html>
