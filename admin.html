<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 자막 제어판</title>
    <style>
        body { background: #222; color: white; padding: 20px; font-family: sans-serif; }
        .panel { background: #333; padding: 20px; border-radius: 10px; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; background: #111; color: white; border: 1px solid #555; }
        button { width: 100%; padding: 15px; background: #00f2fe; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>LIVE CONTROL</h3>
        가수: <input type="text" id="artist" value="NEW ARTIST">
        제목: <input type="text" id="title" value="NEW SONG">
        X: <input type="range" id="posX" min="0" max="1500" value="50">
        Y: <input type="range" id="posY" min="0" max="800" value="50">
        <button onclick="send()">즉시 송출하기</button>
    </div>

    <script>
        const bc = new BroadcastChannel('music_channel');

        function send() {
            const data = {
                artist: document.getElementById('artist').value,
                title: document.getElementById('title').value,
                posX: document.getElementById('posX').value,
                posY: document.getElementById('posY').value
            };
            // 무전기로 데이터 발송!
            bc.postMessage(data);
        }
    </script>
</body>
</html>
