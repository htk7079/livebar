<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자막 마스터 컨트롤러 (미리보기 포함)</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* --- 미리보기 영역 (Viewer와 동일한 디자인) --- */
        .preview-area {
            width: 800px; height: 200px;
            background: #000; background-image: linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222), linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            border: 2px solid #444; border-radius: 10px; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }
        .preview-label { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.7); padding: 2px 8px; font-size: 12px; border-radius: 3px; z-index: 10; }

        /* 자막 바 디자인 (Viewer 코드 복사) */
        .preview-container { position: absolute; display: flex; align-items: center; transition: all 0.3s ease; }
        .background-bar {
            width: 350px; height: 70px; /* 미리보기를 위해 약간 축소 */
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.95) 0%, rgba(60, 60, 60, 0.8) 100%);
            border-left: 6px solid #00f2fe; border-radius: 4px;
            display: flex; align-items: center; padding-left: 20px;
        }
        .text-container { display: flex; flex-direction: column; }
        .artist-text { font-size: 14px; color: #00f2fe; font-weight: 500; }
        .title-text { font-size: 22px; color: white; font-weight: 800; }

        /* --- 제어판 영역 --- */
        .panel { background: #2a2a2a; padding: 25px; border-radius: 15px; width: 400px; border: 1px solid #444; }
        h2 { color: #00f2fe; margin: 0 0 20px 0; text-align: center; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        input[type="text"] { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #111; border: 1px solid #555; border-radius: 5px; color: white; box-sizing: border-box;
        }
        .slider-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .slider-item { flex: 1; }
        input[type="range"] { width: 100%; }
        
        button { 
            width: 100%; padding: 15px; background: #00f2fe; color: #000;
            border: none; border-radius: 5px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #00d4df; }
    </style>
</head>
<body>

    <div class="preview-area">
        <div class="preview-label">LIVE PREVIEW (ADMIN)</div>
        <div class="preview-container" id="pre-container" style="bottom: 20px; left: 20px;">
            <div class="background-bar">
                <div class="text-container">
                    <span class="artist-text" id="pre-artist">ARTIST</span>
                    <span class="title-text" id="pre-title">SONG TITLE</span>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>SUBTITLE MASTER</h2>
        
        <label>가수명</label>
        <input type="text" id="artist" placeholder="가수 이름" oninput="livePreview()">
        
        <label>노래 제목</label>
        <input type="text" id="title" placeholder="곡 제목" oninput="livePreview()">
        
        <div class="slider-group">
            <div class="slider-item">
                <label>가로 위치</label>
                <input type="range" id="posX" min="0" max="400" value="20" oninput="livePreview()">
            </div>
            <div class="slider-item">
                <label>세로 위치</label>
                <input type="range" id="posY" min="0" max="100" value="20" oninput="livePreview()">
            </div>
        </div>
        
        <button onclick="sendData()">본 방송 송출 (UPDATE)</button>
    </div>

<script>
    // 제어판 내에서 미리보기 화면을 실시간으로 업데이트
    function livePreview() {
        const artist = document.getElementById('artist').value || "ARTIST";
        const title = document.getElementById('title').value || "SONG TITLE";
        const posX = document.getElementById('posX').value;
        const posY = document.getElementById('posY').value;

        document.getElementById('pre-artist').innerText = artist;
        document.getElementById('pre-title').innerText = title;
        
        const preContainer = document.getElementById('pre-container');
        preContainer.style.left = posX + "px";
        preContainer.style.bottom = posY + "px";
    }

    // 실제 OBS(Viewer)로 데이터 전송
    function sendData() {
        const data = {
            artist: document.getElementById('artist').value,
            title: document.getElementById('title').value,
            posX: document.getElementById('posX').value * 2.5, // 미리보기보다 큰 OBS 해상도 대응
            posY: document.getElementById('posY').value * 2.5,
            timestamp: Date.now()
        };
        localStorage.setItem('musicData', JSON.stringify(data));
        alert("방송으로 송출되었습니다!");
    }

    // 초기 실행
    livePreview();
</script>

</body>
</html>
